<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="32" fill="#020212"/>

  <!-- Stacked neon blocks -->
  <!-- Block 3 (bottom, widest) -->
  <rect x="8" y="44" width="48" height="10" rx="2"
        fill="rgba(0,255,255,0.25)" stroke="#00ffff" stroke-width="1.5"/>
  <!-- highlight on top block -->
  <rect x="8" y="44" width="48" height="3" rx="1" fill="rgba(255,255,255,0.15)"/>

  <!-- Block 2 (middle) -->
  <rect x="13" y="32" width="38" height="10" rx="2"
        fill="rgba(255,0,255,0.25)" stroke="#ff00ff" stroke-width="1.5"/>
  <rect x="13" y="32" width="38" height="3" rx="1" fill="rgba(255,255,255,0.15)"/>

  <!-- Block 1 (top, narrowest) -->
  <rect x="20" y="20" width="24" height="10" rx="2"
        fill="rgba(0,255,136,0.25)" stroke="#00ff88" stroke-width="1.5"/>
  <rect x="20" y="20" width="24" height="3" rx="1" fill="rgba(255,255,255,0.15)"/>

  <!-- Moving block indicator (sliding) -->
  <rect x="28" y="10" width="14" height="8" rx="1.5"
        fill="rgba(255,238,0,0.3)" stroke="#ffee00" stroke-width="1.5" opacity="0.85"/>

  <!-- Glow effects via filter -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
