<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>

  <!-- Calendar body -->
  <rect x="18" y="30" width="64" height="52" rx="6" fill="white" fill-opacity="0.95"/>

  <!-- Calendar header bar -->
  <rect x="18" y="30" width="64" height="18" rx="6" fill="white" fill-opacity="0.3"/>
  <rect x="18" y="40" width="64" height="8" fill="white" fill-opacity="0.3"/>

  <!-- Calendar hooks -->
  <rect x="34" y="22" width="6" height="16" rx="3" fill="white"/>
  <rect x="60" y="22" width="6" height="16" rx="3" fill="white"/>

  <!-- Dot grid (days) -->
  <circle cx="36" cy="60" r="4" fill="#2563eb"/>
  <circle cx="50" cy="60" r="4" fill="#2563eb"/>
  <circle cx="64" cy="60" r="4" fill="#c7d2fe"/>

  <circle cx="36" cy="74" r="4" fill="#c7d2fe"/>
  <circle cx="50" cy="74" r="4" fill="#2563eb"/>
  <circle cx="64" cy="74" r="4" fill="#c7d2fe"/>
</svg>
